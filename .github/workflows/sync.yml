name: Sync Data to Scholar Repo

on:
  push:
    paths:
      - "data.json"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4

      - name: Copy data.json to Scholar repo
        run: |
          curl -X PUT \
          -H "Authorization: token ${{ secrets.SCHOLAR_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data @data.json \
          https://api.github.com/repos/YOUR_USERNAME/YOUR_SCHOLAR_REPO/contents/data.json
