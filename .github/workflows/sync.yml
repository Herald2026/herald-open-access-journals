name: Sync Data to Scholar Repo

on:
  push:
    paths:
      - "data.json"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4

      - name: Upload data.json to Scholar repo
        run: |
          CONTENT=$(base64 -w 0 data.json)

          curl -X PUT \
          -H "Authorization: token ${{ secrets.SCHOLAR_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"message\": \"update data.json\",
            \"content\": \"$CONTENT\"
          }" \
          https://api.github.com/repos/Herald2026/herald-scholar-publisher/contents/data.json
