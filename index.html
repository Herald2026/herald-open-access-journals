<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herald Open Access Journals</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">
    <h1>Herald Open Access Journals</h1>
    <p>View Published Article below</p>
</header>

<main class="container">

    <div class="controls">
        <input id="search" placeholder="Search title, author, journal...">
        <select id="yearFilter">
            <option value="">All Years</option>
        </select>
    </div>

    <div id="count"></div>

    <table>
        <thead>
            <tr>
                <th>Year</th>
                <th>Title</th>
                <th>Journal</th>
                <th>Authors</th>
                <th>DOI</th>
            </tr>
        </thead>

        <tbody id="results"></tbody>
    </table>

</main>

<script src="search.js"></script>

</body>
</html>
