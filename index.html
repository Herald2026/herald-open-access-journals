<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Herald Journals</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Herald Open Access Journals</h1>
</header>

<div id="journalContainer"></div>

<script>
let journalCount = {};

fetch("data.json")
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("journalContainer");

    data.forEach(a => {
      const j = (a.Journal || "").trim();
      if (!j) return;
      journalCount[j] = (journalCount[j] || 0) + 1;
    });

    Object.entries(journalCount)
      .sort((a, b) => b[1] - a[1])
      .forEach(([journal, count]) => {

        const div = document.createElement("div");

        div.innerHTML = `
          <h3>${journal}</h3>
          <p><b>${count}</b> articles</p>
          <button onclick="openJournal(\`${journal.replace(/`/g, "")}\`)">
            View Articles
          </button>
        `;

        container.appendChild(div);
      });

  })
  .catch(err => {
    document.getElementById("journalContainer").innerHTML =
      "<p>Error loading journals</p>";
    console.error(err);
  });

function openJournal(journal){
  localStorage.setItem("journal", journal);
  window.location.href = "journals.html";
}
</script>

</body>
</html>
