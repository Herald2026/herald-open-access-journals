<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Herald Journals</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Herald Open Access Journals</h1>
</header>

<div id="journalContainer"></div>

<script>
fetch("data.json")
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("journalContainer");

    const journalCount = {};

    data.forEach(a => {
      const j = (a.Journal || "").trim();
      journalCount[j] = (journalCount[j] || 0) + 1;
    });

    Object.entries(journalCount).forEach(([journal, count]) => {

      const div = document.createElement("div");

      div.innerHTML = `
        <h3>${journal}</h3>
        <p>${count} articles</p>
        <button onclick="openJournal('${journal}')">
          View Articles
        </button>
      `;

      container.appendChild(div);
    });

  });

function openJournal(journal){
  localStorage.setItem("journal", journal);
  window.location.href = "journals.html";
}
</script>

</body>
</html>
