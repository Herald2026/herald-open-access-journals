<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Herald Journals</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Herald Open Access Journals</h1>

  <a class="submit-btn"
     href="https://www.heraldopenaccess.us/submit-manuscript"
     target="_blank">
    📄 Submit Manuscript
  </a>
</header>

<div id="journalContainer" class="journal-container"></div>

<script>
fetch('data.json?nocache=' + new Date().getTime())
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("journalContainer");

    // STEP 1: COUNT ARTICLES PER JOURNAL
    const journalCount = {};

    data.forEach(item => {
      const j = (item.Journal || "").trim();
      journalCount[j] = (journalCount[j] || 0) + 1;
    });

    // STEP 2: SORT BY COUNT DESC
    const sorted = Object.entries(journalCount)
      .sort((a, b) => b[1] - a[1]);

    console.log("Sorted Journals:", sorted);

    // STEP 3: DISPLAY
    sorted.forEach(([journal, count]) => {

      const card = document.createElement("div");
      card.className = "journal-card";

      card.innerHTML = `
        <h3>${journal}</h3>
        <p><b>Articles:</b> ${count}</p>
        <button onclick="openJournal('${journal}')">
          🔍 View Articles
        </button>
      `;

      container.appendChild(card);
    });

  });

function openJournal(journal) {
  localStorage.setItem("selectedJournal", journal.trim());
  window.location.href = "article.html";
}
</script>

</body>
</html>
