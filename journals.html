<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Journal Articles</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2 id="title"></h2>
<div id="list"></div>

<script>
const journal = localStorage.getItem("journal") || "";
document.getElementById("title").innerText = journal;

fetch("articles.json")
  .then(res => res.json())
  .then(data => {

    const filtered = data.filter(a =>
      (a.Journal || "").trim() === journal.trim()
    );

    const container = document.getElementById("list");

    if (!filtered.length) {
      container.innerHTML = "<p>No articles found</p>";
      return;
    }

    filtered.forEach(a => {

      const id = (a.DOI || "").split("/").pop();

      const div = document.createElement("div");

      div.innerHTML = `
        <h4>${a.Title}</h4>
        <p>${a.Year}</p>

        <button onclick="openArticle('${id}')">
          Open Article
        </button>
      `;

      container.appendChild(div);
    });

  });

function openArticle(id){
  window.location.href = "article.html?id=" + id;
}
</script>

</body>
</html>
