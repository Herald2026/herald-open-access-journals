<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Journals</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>All Journals</h2>

<!-- 🔥 SUBMIT MANUSCRIPT BUTTON -->
<div style="margin-bottom:20px;">
    <a href="https://www.heraldopenaccess.us/submit-manuscript" target="_blank" class="submit-btn">
        🚀 Submit Manuscript
    </a>
</div>

<div id="journalList"></div>

<script>
let allData = [];

fetch("articles.json")
.then(res => res.json())
.then(data => {
    allData = data;
    renderJournals(data);
});

/* =====================
   GROUP BY JOURNAL
===================== */
function renderJournals(data) {

    const journalsMap = {};

    data.forEach(a => {
        const j = a.Journal || "Unknown Journal";

        if (!journalsMap[j]) {
            journalsMap[j] = 0;
        }
        journalsMap[j]++;
    });

    let html = "";

    Object.keys(journalsMap).forEach(journal => {

        html += `
        <div class="card">

            <h3>${journal}</h3>

            <p><b>Total Articles:</b> ${journalsMap[journal]}</p>

            <a class="btn" href="search.html?journal=${encodeURIComponent(journal)}">
                🔍 Search Published Articles
            </a>

        </div>
        `;
    });

    document.getElementById("journalList").innerHTML = html;
}
</script>

</body>
</html>
