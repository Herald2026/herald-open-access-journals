<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Articles</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1 id="journalTitle">Journal Articles</h1>

  <a class="submit-btn"
     href="https://www.heraldopenaccess.us/submit-manuscript"
     target="_blank">
    📄 Submit Manuscript
  </a>
</header>

<div id="articleContainer" class="journal-container"></div>

<script>
const journal = localStorage.getItem("selectedJournal");
document.getElementById("journalTitle").innerText = journal;

fetch('data.json')
  .then(res => res.json())
  .then(data => {

    const filtered = data.filter(item => item.Journal === journal);

    const container = document.getElementById("articleContainer");

    if (filtered.length === 0) {
      container.innerHTML = "<p>No articles found.</p>";
      return;
    }

    filtered.forEach(a => {

      const div = document.createElement("div");
      div.className = "journal-card";

      div.innerHTML = `
        <h3>${a.Title}</h3>
        <p><b>Authors:</b> ${a.Authors}</p>
        <p><b>Year:</b> ${a.Year}</p>
        <p><b>DOI:</b> ${a.DOI}</p>
        <p><a href="${a.HTML_URL}" target="_blank">🔗 Open Article</a></p>
      `;

      container.appendChild(div);
    });

  });
</script>
  
</body>
</html>
