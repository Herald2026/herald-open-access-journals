<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Articles</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1 id="journalTitle">Journal Articles</h1>

  <a class="submit-btn"
     href="https://www.heraldopenaccess.us/submit-manuscript"
     target="_blank">
    📄 Submit Manuscript
  </a>
</header>

<div id="articleContainer" class="journal-container"></div>

<script>
const journal = (localStorage.getItem("selectedJournal") || "").trim();

document.getElementById("journalTitle").innerText = journal;

fetch('data.json?nocache=' + new Date().getTime())
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("articleContainer");

    // STEP 1: FILTER (safe match)
    let filtered = data.filter(item =>
      (item.Journal || "").trim() === journal
    );

    console.log("Selected Journal:", journal);
    console.log("Articles Found:", filtered.length);

    // STEP 2: SORT BY YEAR (LATEST FIRST)
    filtered.sort((a, b) => b.Year - a.Year);

    // STEP 3: NO DATA CASE
    if (filtered.length === 0) {
      container.innerHTML = "<p>No articles found.</p>";
      return;
    }

    // STEP 4: RENDER PREVIEW
    filtered.forEach(a => {

      const div = document.createElement("div");
      div.className = "journal-card";

      div.innerHTML = `
        <h3>${a.Title}</h3>
        <p><b>Year:</b> ${a.Year}</p>
        <p><b>Authors:</b> ${a.Authors}</p>
        <p><b>DOI:</b> ${a.DOI}</p>

        <a href="${a.HTML_URL}" target="_blank">
          🔗 Open Full Article
        </a>
      `;

      container.appendChild(div);
    });

  })
  .catch(err => {
    console.error("Error loading data:", err);
  });
</script>

</body>
</html>
