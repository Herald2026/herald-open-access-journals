<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Articles</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1 id="journalTitle">Journal Articles</h1>

  <a class="submit-btn" href="https://www.heraldopenaccess.us/submit-manuscript" target="_blank">
    📄 Submit Manuscript
  </a>
</header>

<div id="articleContainer" class="journal-container"></div>

<script>
const journal = localStorage.getItem("selectedJournal");
document.getElementById("journalTitle").innerText = journal;

// 🔥 SAMPLE ARTICLES (replace later with your DOI dataset)
const articles = [
  {
    title: "Sample Research Paper 1",
    authors: "Author A",
    year: 2024,
    doi: "10.1000/sample1"
  },
  {
    title: "Sample Research Paper 2",
    authors: "Author B",
    year: 2025,
    doi: "10.1000/sample2"
  }
];

const container = document.getElementById("articleContainer");

articles.forEach(a => {
  const div = document.createElement("div");
  div.className = "journal-card";

  div.innerHTML = `
    <h3>${a.title}</h3>
    <p><b>Authors:</b> ${a.authors}</p>
    <p><b>Year:</b> ${a.year}</p>
    <p><b>DOI:</b> ${a.doi}</p>
  `;

  container.appendChild(div);
});
</script>

</body>
</html>
