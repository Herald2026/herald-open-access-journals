<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Articles</title>
<link rel="stylesheet" href="style.css">

<style>
.layout {
  display: flex;
}

/* LEFT PANEL */
.year-panel {
  width: 180px;
  background: #f4f6f9;
  padding: 15px;
  height: 100vh;
  position: sticky;
  top: 0;
}

.year-btn {
  display: block;
  margin: 6px 0;
  padding: 8px;
  background: white;
  border: 1px solid #ccc;
  cursor: pointer;
  border-radius: 5px;
}

.year-btn:hover {
  background: #0b3d91;
  color: white;
}

/* RIGHT CONTENT */
.content {
  flex: 1;
  padding: 20px;
}
</style>

</head>

<body>

<header>
  <h1 id="journalTitle">Journal Articles</h1>

  <a class="submit-btn"
     href="https://www.heraldopenaccess.us/submit-manuscript"
     target="_blank">
    📄 Submit Manuscript
  </a>
</header>

<div class="layout">

  <!-- YEAR SIDEBAR -->
  <div class="year-panel">
    <h3>Years</h3>
    <div id="yearList"></div>
  </div>

  <!-- ARTICLES -->
  <div class="content">
    <div id="articleContainer" class="journal-container"></div>
  </div>

</div>

<script>

const journal = (localStorage.getItem("selectedJournal") || "").trim();
document.getElementById("journalTitle").innerText = journal;

let allArticles = [];

fetch('data.json?nocache=' + new Date().getTime())
  .then(res => res.json())
  .then(data => {

    // FILTER JOURNAL (SAFE MATCH)
    allArticles = data.filter(item =>
      (item.Journal || "").trim().toLowerCase() === journal.toLowerCase()
    );

    // SORT BY YEAR DESC
    allArticles.sort((a, b) => b.Year - a.Year);

    console.log("Articles Found:", allArticles.length);

    buildYearSidebar(allArticles);
    renderArticles(allArticles);
  });

// --------------------
// BUILD YEAR BUTTONS
// --------------------
function buildYearSidebar(data) {

  const yearList = document.getElementById("yearList");

  const years = [...new Set(data.map(a => a.Year))].sort((a, b) => b - a);

  let html = `
    <button class="year-btn" onclick="renderArticles(allArticles)">
      All Years
    </button>
  `;

  years.forEach(year => {
    html += `
      <button class="year-btn" onclick="filterYear(${year})">
        ${year}
      </button>
    `;
  });

  yearList.innerHTML = html;
}

// --------------------
// FILTER BY YEAR
// --------------------
function filterYear(year) {
  const filtered = allArticles.filter(a => a.Year === year);
  renderArticles(filtered);
}

// --------------------
// RENDER ARTICLES
// --------------------
function renderArticles(list) {

  const container = document.getElementById("articleContainer");
  container.innerHTML = "";

  if (!list.length) {
    container.innerHTML = "<p>No articles found.</p>";
    return;
  }

  list.forEach(a => {

    const div = document.createElement("div");
    div.className = "journal-card";

    div.innerHTML = `
      <h3>${a.Title}</h3>
      <p><b>Year:</b> ${a.Year}</p>
      <p><b>Authors:</b> ${a.Authors}</p>
      <p><b>DOI:</b> ${a.DOI}</p>
      <a href="${a.HTML_URL}" target="_blank">🔗 Open Article</a>
    `;

    container.appendChild(div);
  });
}

</script>

</body>
</html>
