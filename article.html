<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Articles</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1 id="journalTitle">Journal Articles</h1>

  <a class="submit-btn"
     href="https://www.heraldopenaccess.us/submit-manuscript"
     target="_blank">
    📄 Submit Manuscript
  </a>
</header>

<div id="articleContainer" class="journal-container"></div>

<script>
const journal = localStorage.getItem("selectedJournal");

// SAFE TITLE HANDLING
document.getElementById("journalTitle").innerText =
  journal ? journal : "Journal Articles";

// LOAD DATA
fetch('data.json')
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("articleContainer");

    if (!journal) {
      container.innerHTML = "<p>No journal selected.</p>";
      return;
    }

    // SAFE MATCH (trim + case-safe)
    const filtered = data.filter(item =>
      (item.Journal || "").trim() === journal.trim()
    );

    if (filtered.length === 0) {
      container.innerHTML = "<p>No articles found for this journal.</p>";
      return;
    }

    filtered.forEach(a => {

      const div = document.createElement("div");
      div.className = "journal-card";

      div.innerHTML = `
        <h3>${a.Title}</h3>
        <p><b>Authors:</b> ${a.Authors}</p>
        <p><b>Year:</b> ${a.Year}</p>
        <p><b>DOI:</b> ${a.DOI}</p>
        <p>
          <a href="${a.HTML_URL}" target="_blank">
            🔗 Open Article
          </a>
        </p>
      `;

      container.appendChild(div);
    });

  })
  .catch(err => {
    console.error("Error loading data.json:", err);
    document.getElementById("articleContainer").innerHTML =
      "<p>Error loading articles.</p>";
  });
</script>
  
</body>
</html>
