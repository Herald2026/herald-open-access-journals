<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Article</title>
<link rel="stylesheet" href="style.css">

<meta name="citation_title" content="">
<meta name="citation_author" content="">
<meta name="citation_journal_title" content="">
<meta name="citation_publication_date" content="">
<meta name="citation_doi" content="">

<script type="application/ld+json">
{}
</script>

</head>

<body>

<div id="content">Loading...</div>

<script>
let data = [];

fetch("articles.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    load();
  });

function getId(){
  return new URLSearchParams(window.location.search).get("id");
}

function setMeta(name, value){
  const tag = document.querySelector(`meta[name="${name}"]`);
  if(tag) tag.setAttribute("content", value || "");
}

function load(){

  const id = getId();

  const article = data.find(a =>
    (a.DOI || "").split("/").pop() === id
  );

  if(!article){
    document.body.innerHTML = "<h2>Article Not Found</h2>";
    return;
  }

  document.title = article.Title;

  // META TAGS (GOOGLE SCHOLAR)
  setMeta("citation_title", article.Title);
  setMeta("citation_author", article.Authors);
  setMeta("citation_journal_title", article.Journal);
  setMeta("citation_publication_date", article.Year);
  setMeta("citation_doi", article.DOI);

  // JSON-LD (SEO)
  document.querySelector('script[type="application/ld+json"]').textContent =
  JSON.stringify({
    "@context": "https://schema.org",
    "@type": "ScholarlyArticle",
    "headline": article.Title,
    "author": {
      "@type": "Person",
      "name": article.Authors
    },
    "publisher": {
      "@type": "Organization",
      "name": "Herald Open Access Journals"
    },
    "datePublished": article.Year,
    "identifier": {
      "@type": "PropertyValue",
      "propertyID": "DOI",
      "value": article.DOI
    }
  });

  document.getElementById("content").innerHTML = `
    <h1>${article.Title}</h1>

    <p><b>Authors:</b> ${article.Authors}</p>
    <p><b>Journal:</b> ${article.Journal}</p>
    <p><b>Year:</b> ${article.Year}</p>
    <p><b>DOI:</b> ${article.DOI}</p>

    <hr>

    <a target="_blank" href="https://doi.org/${article.DOI}">
      🔗 Open DOI
    </a>

    <br><br>

    <a target="_blank"
       href="https://scholar.google.com/scholar?q=${encodeURIComponent(article.Title)}">
      📚 Google Scholar Search
    </a>
  `;
}
</script>

</body>
</html>
