<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Article</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="content">Loading...</div>

<script>
let data = [];

fetch("articles.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    load();
  });

function getId(){
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

function load(){

  const id = getId();

  const article = data.find(a => (a.DOI || "").split("/").pop() === id);

  if(!article){
    document.body.innerHTML = "<h2>Article Not Found</h2>";
    return;
  }

  document.title = article.Title;

  document.getElementById("content").innerHTML = `
    <h1>${article.Title}</h1>

    <p><b>Authors:</b> ${article.Authors}</p>
    <p><b>Journal:</b> ${article.Journal}</p>
    <p><b>Year:</b> ${article.Year}</p>
    <p><b>DOI:</b> ${article.DOI}</p>

    <hr>

    <a href="https://doi.org/${article.DOI}" target="_blank">
      🔗 Open DOI
    </a>
  `;
}
</script>

</body>
</html>
