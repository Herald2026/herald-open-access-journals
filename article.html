<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Journal Articles</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1 id="journalTitle">Journal Articles</h1>

  <!-- SAME STYLISH BUTTON -->
  <a class="submit-btn" href="https://your-link-here.com" target="_blank">
    📄 Submit Manuscript
  </a>
</header>

<div id="articleContainer" class="journal-container"></div>

<script>
const journal = localStorage.getItem("selectedJournal");
document.getElementById("journalTitle").innerText = journal;

// 🔥 SAMPLE ARTICLES (you will later connect DOI dataset here)
const articles = [
  {
    title: "Sample Research Article 1",
    authors: "Author A",
    year: 2024,
    doi: "10.0000/sample1"
  },
  {
    title: "Sample Research Article 2",
    authors: "Author B",
    year: 2025,
    doi: "10.0000/sample2"
  }
];

const container = document.getElementById("articleContainer");

articles.forEach(a => {
  const div = document.createElement("div");
  div.className = "journal-card";

  div.innerHTML = `
    <h3>${a.title}</h3>
    <p><b>Authors:</b> ${a.authors}</p>
    <p><b>Year:</b> ${a.year}</p>
    <p><b>DOI:</b> ${a.doi}</p>
  `;

  container.appendChild(div);
});
</script>

</body>
</html>
