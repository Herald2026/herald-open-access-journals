<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Articles</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1 id="journalTitle">Journal Articles</h1>

  <a class="submit-btn"
     href="https://www.heraldopenaccess.us/submit-manuscript"
     target="_blank">
    📄 Submit Manuscript
  </a>
</header>

<div id="articleContainer" class="journal-container"></div>

<script>
const journal = localStorage.getItem("selectedJournal");

document.getElementById("journalTitle").innerText =
  journal ? journal : "Journal Articles";

let allArticles = [];

// ONLY RUN AFTER PAGE LOAD (after click from index)
fetch('data.json?nocache=' + new Date().getTime())
  .then(res => res.json())
  .then(data => {

    // filter selected journal
    allArticles = data.filter(item =>
      (item.Journal || "").trim().toLowerCase() ===
      (journal || "").trim().toLowerCase()
    );

    // sort latest first
    allArticles.sort((a, b) => b.Year - a.Year);

    // build UI ONLY here (after click navigation)
    buildYearSidebar(allArticles);
    renderArticles(allArticles);
  });

// --------------------
// CREATE YEAR SIDEBAR
// --------------------
function buildYearSidebar(data) {

  const yearList = document.getElementById("yearList");

  const years = [...new Set(data.map(a => a.Year))].sort((a, b) => b - a);

  yearList.innerHTML = `
    <button class="year-btn" onclick="renderArticles(allArticles)">
      All Years
    </button>
  `;

  years.forEach(year => {
    yearList.innerHTML += `
      <button class="year-btn" onclick="filterByYear(${year})">
        ${year}
      </button>
    `;
  });
}

// --------------------
// FILTER FUNCTION
// --------------------
function filterByYear(year) {
  const filtered = allArticles.filter(a => a.Year === year);
  renderArticles(filtered);
}

// --------------------
// RENDER ARTICLES
// --------------------
function renderArticles(list) {

  const container = document.getElementById("articleContainer");
  container.innerHTML = "";

  if (!list.length) {
    container.innerHTML = "<p>No articles found.</p>";
    return;
  }

  list.forEach(a => {

    const div = document.createElement("div");
    div.className = "journal-card";

    div.innerHTML = `
      <h3>${a.Title}</h3>
      <p><b>Year:</b> ${a.Year}</p>
      <p><b>Authors:</b> ${a.Authors}</p>
      <p><b>DOI:</b> ${a.DOI}</p>
      <p><a href="${a.HTML_URL}" target="_blank">🔗 Open Article</a></p>
    `;

    container.appendChild(div);
  });
}
</script>
  
</body>
</html>
