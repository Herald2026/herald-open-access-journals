<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Articles</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1 id="journalTitle">Journal Articles</h1>

  <a class="submit-btn"
     href="https://www.heraldopenaccess.us/submit-manuscript"
     target="_blank">
    📄 Submit Manuscript
  </a>
</header>

<div id="articleContainer" class="journal-container"></div>

<script>
const journal = localStorage.getItem("selectedJournal");
document.getElementById("journalTitle").innerText = journal;

// 🔥 LOAD REAL DATA FROM data.json
fetch('data.json')
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("articleContainer");

    // FILTER ARTICLES BY SELECTED JOURNAL
    const filtered = data.filter(item => item.journal === journal);

    console.log("Articles found:", filtered.length);

    // IF NO ARTICLES
    if (filtered.length === 0) {
      container.innerHTML = "<p>No articles found for this journal.</p>";
      return;
    }

    // DISPLAY ARTICLES
    filtered.forEach(a => {

      const div = document.createElement("div");
      div.className = "journal-card";

      div.innerHTML = `
        <h3>${a.title}</h3>
        <p><b>Authors:</b> ${a.authors}</p>
        <p><b>Year:</b> ${a.year}</p>
        <p><b>DOI:</b> ${a.doi}</p>
      `;

      container.appendChild(div);
    });

  })
  .catch(err => {
    console.error("Error loading data.json:", err);
  });
</script>

</body>
</html>
